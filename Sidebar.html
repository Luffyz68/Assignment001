<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar</title>

<style>
    body {
        margin: 0;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        padding: 20px 0;
        font-family: sans-serif;
    }
    .container {
        width: 90%;
        max-width: 1200px;
        display: flex;
        flex-direction: column;
        gap: 25px;
    }
    .box {
        background: #e1e76b; 
        display: flex;
        justify-content: center;
        align-items: center;
        color: #666;
    }
    .row-top {
        display: flex;
        justify-content: space-between;
    }
    .w20 { width: 20%; 
        height: 100px; }
    .w40 { width: 45%; 
        height: 100px; }

    .row-middle {
        display: flex;
        gap: 15px;
        height: 550px; 
    }

   
    .left-stack {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 30%; 
    }
    .box-3 { height: 65%; } 
    .box-4 { height: 35%; } 

    .right-main {
        flex: 1;
        height: 100%;
    }
    .footer-bar {
        width: 100%;
        height: 100px;
    }

</style>
</head>
<body>

<div class="container">

    <div class="row-top">
        <div class="box w20">Box 1</div>
        <div class="box w40">Box 2</div>
    </div>

    <div class="row-middle">
        
        <div class="left-stack">
            <div class="box box-3">Box 3</div>
            <div class="box box-4">Box 4</div>
        </div>

        <div class="box right-main">Box 5</div>

    </div>

    <div class="box footer-bar">Footer</div>

</div>

</body>
</html>
