<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realty</title>

<style>
    body {
        margin: 0;
        background: #38deba;
        font-family: sans-serif;
    }

    .header-top {
        width: 100%;
        height: 40px;
        background: #d1d5db;
        margin-bottom: 5px;
        margin-bottom: 15px; 
        display: flex;
        justify-content: center;
        align-items: center;
       
    }

    .banner-full {
        width: 100%;
        height: 200px;
        background: #e5e7eb;
        margin-bottom: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
       
    }
    .container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 22px;
    }

    .box {
        background: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #666;
        font-weight: bold;
    }
    .content-grid {
        display: flex;
        gap: 15px;
        height: 450px;
    }
    .sidebar-left {
        flex: 1; 
        height: 100%;
    }
    .main-right-wrapper {
        flex: 3; 
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .main-box-top {
        flex: 3; 
    }
    .main-bottom-row {
        flex: 1; 
        display: flex;
        gap: 15px;
    }
    .sub-box {
        flex: 1;
        height: 100%;
    }
    .footer-bar {
        width: 100%;
        height: 50px;
        margin-bottom: 20px;
    }

</style>
</head>
<body>

    <div class="header-top">Header</div>
    <div class="banner-full">Banner</div>

    <div class="container">

        <div class="content-grid">
            <div class="box sidebar-left">Box 1</div>

            <div class="main-right-wrapper">
                <div class="box main-box-top"> Box 2 </div>
                
                <div class="main-bottom-row">
                    <div class="box sub-box">Box 3</div>
                    <div class="box sub-box">Box 4</div>
                </div>
            </div>
        </div>

        <div class="box footer-bar">Footer</div>

    </div>

</body>
</html>
