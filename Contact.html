<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
    body {
        margin: 0;
        background: #d1db17;
        display: flex;
        justify-content: center;
        padding: 20px 0;
        font-family: sans-serif;
    }

    .container {
        width: 90%; 
        max-width: 1200px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .box {
        background: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #666;
        font-weight: bold;
    }

    .header-bar {
        height: 100px;
        width: 100%;
    }

    .main-wrapper {
        display: flex;
        gap: 25px;
    }


    .left-content {
        flex: 3; 
        display: flex;
        flex-direction: column;
        gap: 25px;
    }

    .box-1 { height: 120px; }
    .box-3 { height: 350px; }

    .sidebar {
        flex: 1; 
        display: flex;
        flex-direction: column;
        gap: 25px;
    }

    .box-2 { height: 280px; } 
    .box-4 { height: 80px; }  

    
    .box-6 {
        width: 15%; 
        height: 35px;
    }

    .footer-bar {
        height: 100px;
        width: 100%;
    }
</style>
</head>

<body>

<div class="container">

    <div class="box header-bar">Header</div>

    <div class="main-wrapper">
        
        <div class="left-content">
            <div class="box box-1">Box 1</div>
            <div class="box box-3">Box 3</div>
        </div>

        <div class="sidebar">
            <div class="box box-2">Box 2</div>
            <div class="box box-4">Box 4</div>
        </div>

    </div>

    <div class="box box-6">Box 5</div>

    <div class="box footer-bar">Footer</div>

</div>

</body>
</html>
