<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing</title>

<style>
    body {
        margin: 0;
        background: #f4f4f4;
        font-family: sans-serif;
    }
    .full-width-box {
        width: 100%;
        height: 90px;
        background: #4661f9;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-weight: bold;
    }
    .container {
        width: 95%;
        max-width: 1200px;
        margin: 0 auto; 
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        gap: 25px;
    }

    .box {
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-weight: bold;
    }
    .banner {
        height: 250px;
        background: linear-gradient(to right, #12a407, #0bc8ed);
    }
    .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
    }
    .flex { height: 300px; }
    .d1 { width: 32%; background-color: #0bc8ed; }
    .d2 { width: 32%; background: #ef0d8d; }
    .d3 { width: 32%; background: #1a7ab1; }

    .footer-box {
        height: 100px;
        background-color: #b10606;
        width: 100%;
    }
</style>
</head>

<body>

    <div class="full-width-box">Box 1 </div>

    <div class="container">

        <div class="box banner">Banner</div>

        <div class="row">
            <div class="box flex d1">Box 2</div>
            <div class="box flex d2">Box 3</div>
            <div class="box flex d3">Box 4</div>
        </div>

        <div class="box footer-box">Box 5</div>

    </div>

</body>
</html>
