<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Home</title>

<style>
    body {
        margin: 0;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        padding: 20px 0;
        font-family: sans-serif;
    }

    .container {
        width: 90%;
        max-width: 1200px;
        display: flex;
        flex-direction: column;
        gap: 10px; 
    }

    .box {
        background: #12e212;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #000000;
    }

    .header-bar {
        height: 30px;
        width: 100%;
    }

    .banner {
        height: 350px;
        width: 100%;
    }

    .mid-section {
        display: flex;
        gap: 10px;
        height: 250px;
    }

    .mid-left {
        flex: 2; 
        height: 100%;
    }

  
    .mid-right-grid {
        flex: 1; 
        display: grid;
        grid-template-columns: 1fr 2fr 1fr; 
        grid-template-rows: 1fr 1fr; 
        gap: 10px;
    }

    .grid-item {
        background: #ff7272;
    }

   
    .footer-main {
        height: 80px;
        width: 100%;
    }

    .footer-thin {
        height: 15px;
        width: 100%;
    }
</style>
</head>

<body>

<div class="container">

    <div class="box header-bar">Header</div>

    <div class="box banner">Big Banner</div>

    <div class="mid-section">
        <div class="box mid-left">Box 1</div>

        <div class="mid-right-grid">
            <div class="box grid-item">Box2</div>
            <div class="box grid-item">Box3</div>
            <div class="box grid-item">Box4</div>
            <div class="box grid-item">Box5</div>
            <div class="box grid-item">Box6</div>
            <div class="box grid-item">Box7</div>
        </div>
    </div>

    <div class="box footer-main">Footer Box</div>

    <div class="box footer-thin">Bar</div>

</div>

</body>
</html>
