<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>So Boxy</title>

<style>
    body {
        margin: 0;
        background: #f4f4f4;
        font-family: sans-serif;
    }
    .header-top {
        width: 100%;
        height: 50px;
        background: #80a9e7;
        margin-bottom: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .container {
        width: 95%;
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .box {
        background: #dc5c5c;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #666;
        font-weight: bold;
    }
    .top-grid-row {
        display: flex;
        gap: 15px;
        height: 350px;
    }

    .large-feature {
        flex: 1.2; 
        height: 100%;
    }
    .nested-grid-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .nested-top { flex: 2; } 
    
    .nested-bottom-row {
        flex: 1;
        display: flex;
        gap: 15px;
    }

    .small-box { flex: 1; height: 100%; }
    .middle-banner {
        width: 100%;
        height: 100px;
    }

    .bottom-row {
        display: flex;
        gap: 15px;
        height: 200px;
    }

    .col-4 {
        flex: 1;
        height: 100%;
    }

    .footer-bar {
        height: 60px;
        width: 100%;
        margin-bottom: 20px;
    }
</style>
</head>
<body>

    <div class="header-top">Header</div>

    <div class="container">

        <div class="top-grid-row">
            <div class="box large-feature">Box 1</div>
            
            <div class="nested-grid-right">
                <div class="box nested-top">Box 2</div>
                <div class="nested-bottom-row">
                    <div class="box small-box">Box 3</div>
                    <div class="box small-box">Box 4</div>
                </div>
            </div>
        </div>

        <div class="box middle-banner">Box 5</div>

        <div class="bottom-row">
            <div class="box col-4">Box 6</div>
            <div class="box col-4">Box 7</div>
            <div class="box col-4">Box 8</div>
            <div class="box col-4">Box 9</div>
        </div>

        <div class="box footer-bar">Footer</div>

    </div>

</body>
</html>
